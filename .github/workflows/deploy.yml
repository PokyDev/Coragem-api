# .github/workflows/deploy.yml
name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: ~/deploy.sh
```

Haz commit y push de este archivo. A partir de ahora, cada push a `main` dispara el workflow, que conecta por SSH y ejecuta `deploy.sh`. Los logs quedan en `~/deploy-logs/deploy.log` en la instancia.

---

**Resumen del flujo final**
```
Push a main
    ↓
GitHub Actions (SSH)
    ↓
deploy.sh en EC2
    ├── git pull
    ├── npm install
    ├── prisma migrate deploy
    └── pm2 restart
    ↓
Nginx (TLS termination)
    ↓
https://api.coragem.shop → localhost:3001